[package]
name = "pyonji"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
bumpalo = { version = "3.20.2", features = ["collections"] }
bytemuck = { version = "1.16", features = ["derive"] }
cansi = "2.2.1"
compact_str = "0.8"
glyphon = { git = "https://github.com/Scar-00/glyphon" }
pollster = "0.4"
portable-pty = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
vt100 = "0.15"
wgpu = { version = "28.0.0", default-features = false, features = ["wgsl", "vulkan"] }
winit = "0.30"
